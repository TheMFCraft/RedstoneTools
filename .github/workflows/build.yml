name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew :1.18.2_fabric:remapJar :1.19.4_fabric:remapJar :1.20.6_fabric:remapJar :1.20.6_neoforge:remapJar :1.21.5_fabric:remapJar :1.21.5_neoforge:remapJar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect JARs
        id: jars
        run: |
          mkdir -p artifacts
          find . -path '*/build/libs/*.jar' -not -name '*sources*' -not -name '*transform*' -not -name '*dev*' -exec cp {} artifacts/ \;
          ls -la artifacts/
          echo "Found $(ls artifacts/*.jar | wc -l) JARs"

      - uses: actions/upload-artifact@v4
        with:
          name: RedstoneTweaks
          path: artifacts/*.jar

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.jar
